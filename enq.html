<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquiry Form</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#4e73df,#6f42c1);
            font-family: Arial, Helvetica, sans-serif;
        }

        .enquiry-card{
            max-width: 550px;
            margin: 60px auto;
            background: #fff;
            border-radius: 15px;
            padding: 35px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .form-title{
            text-align: center;
            font-weight: bold;
            color: #4e73df;
            margin-bottom: 25px;
        }

        .form-label{
            font-weight: 600;
            color: #444;
        }

        .form-control,
        .form-select{
            border-radius: 8px;
            padding: 10px;
        }

        .btn-submit{
            background: #4e73df;
            color: white;
            font-weight: 600;
            border-radius: 8px;
            padding: 10px;
        }

        .btn-submit:hover{
            background: #365dc9;
            color: white;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card enquiry-card">

        <h2 class="form-title">Student Enquiry Form</h2>

        <form action="enq.jsp" method="get">

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="nm" class="form-control" placeholder="Enter your name">
            </div>

            <div class="mb-3">
                <label class="form-label">Mobile Number</label>
                <input type="tel" name="mob" class="form-control" placeholder="Enter mobile number">
            </div>

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="Enter email">
            </div>

            <div class="mb-3">
                <label class="form-label">City</label>
                <input type="text" name="city" class="form-control" placeholder="Enter city">
            </div>

            <div class="mb-3">
                <label class="form-label">Age</label>
                <input type="number" name="age" class="form-control" placeholder="Enter age">
            </div>

            <div class="mb-4">
                <label class="form-label">Course</label>
                <select class="form-select" name="cc">
                    <option selected>Select Course</option>
                    <option value="Java">Java Full Stack</option>
                    <option value="python">Python Full Stack</option>
                    <option value="DS">Data Science</option>
                    <option value="web">Web Development</option>
                    <option value="Django">Django</option>
                </select>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-submit">
                    Submit Enquiry
                </button>
            </div>

        </form>

    </div>
</div>

</body>
</html>
