<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            margin:0;
            padding:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0d6efd,#6610f2);
            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
        }

        .login-card{
            width:100%;
            max-width:420px;
            background:#fff;
            padding:40px;
            border-radius:18px;
            box-shadow:0 15px 35px rgba(0,0,0,0.2);
        }

        .login-icon{
            width:80px;
            height:80px;
            background:#0d6efd;
            color:#fff;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:35px;
            margin:0 auto 20px;
        }

        .form-title{
            text-align:center;
            font-weight:700;
            color:#0d6efd;
            margin-bottom:8px;
        }

        .form-subtitle{
            text-align:center;
            color:#6c757d;
            font-size:15px;
            margin-bottom:30px;
        }

        .form-label{
            font-weight:600;
            color:#495057;
        }

        .form-control{
            border-radius:10px;
            height:48px;
        }

        .form-control:focus{
            box-shadow:none;
            border-color:#0d6efd;
        }

        .btn-login{
            background:#0d6efd;
            color:#fff;
            font-weight:600;
            border-radius:10px;
            height:48px;
            transition:0.3s;
        }

        .btn-login:hover{
            background:#0b5ed7;
            color:#fff;
        }
    </style>
</head>
<body>

<div class="login-card">

    <div class="login-icon">
        👤
    </div>

    <h2 class="form-title">Student Login</h2>
    <p class="form-subtitle">Please enter your details to continue</p>

    <form action="login.jsp" method="get">

        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="nm" class="form-control" placeholder="Enter your full name">
        </div>

        <div class="mb-4">
            <label class="form-label">Mobile Number</label>
            <input type="tel" name="mcc ob" class="form-control" placeholder="Enter your mobile number">
        </div>

        <div class="d-grid">
            <button type="submit" class="btn btn-login">
                Login
            </button>
        </div>

    </form>

</div>

</body>
</html>
